<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Knowledge Base - FinReg AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .manage-container {
            padding: 32px;
            overflow-y: auto;
            height: calc(100% - 80px);
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            background: rgba(1, 4, 9, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--surface-border);
        }
        .stats-table th, .stats-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--surface-border);
        }
        .stats-table th {
            background: rgba(48, 54, 61, 0.5);
            font-weight: 600;
            color: var(--text-primary);
        }
        .stats-table tr:last-child td {
            border-bottom: none;
        }
        .stats-table td {
            color: var(--text-secondary);
        }
        .stats-table td:first-child {
            color: var(--accent-primary);
            font-weight: 600;
        }
        .section-title {
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .card {
            background: rgba(48, 54, 61, 0.3);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header" style="position: relative;">
            <h1 id="app-title">FinReg <span class="accent">Manage</span></h1>
            <p class="subtitle">Knowledge Base Dashboard</p>
            <a href="index.html" class="add-btn" style="text-decoration: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back to Chat
            </a>
        </header>

        <div class="manage-container">
            <div class="card">
                <h2 class="section-title">Current Knowledge Base</h2>
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>Document ID</th>
                            <th>Total Articles</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body">
                        <tr><td colspan="2" style="text-align:center;">Loading statistics...</td></tr>
                    </tbody>
                </table>
                <div style="display: flex; gap: 16px; align-items: center;">
                    <button id="rebuild-btn" class="primary-btn" style="width: auto; margin: 0;">Rebuild Vector Indices</button>
                    <span id="rebuild-status" class="status-msg hidden" style="margin: 0; padding: 8px 16px;"></span>
                </div>
                <p style="margin-top: 12px; font-size: 13px; color: var(--text-secondary);">
                    Note: After adding new documents below, you must click Rebuild to make them searchable.
                </p>
            </div>

            <div class="card">
                <h2 class="section-title">Add Custom Document</h2>
                <form id="ingest-form">
                    <div class="form-group">
                        <label for="ingest-doc-id">Document ID (e.g. MYPOLICY)</label>
                        <input type="text" id="ingest-doc-id" required placeholder="MYPOLICY">
                    </div>
                    <div class="form-group">
                        <label for="ingest-art-num">Article / Section Number</label>
                        <input type="text" id="ingest-art-num" required placeholder="1.1">
                    </div>
                    <div class="form-group">
                        <label for="ingest-title">Article Title</label>
                        <input type="text" id="ingest-title" required placeholder="Scope and Definitions">
                    </div>
                    <div class="form-group">
                        <label for="ingest-text">Document Content</label>
                        <textarea id="ingest-text" required placeholder="Paste the full text here..." rows="8"></textarea>
                    </div>
                    <button type="submit" id="ingest-submit" class="primary-btn">Add to Corpus</button>
                </form>
                <div id="ingest-status" class="status-msg hidden"></div>
            </div>
        </div>
    </div>
    <script src="manage.js"></script>
</body>
</html>
