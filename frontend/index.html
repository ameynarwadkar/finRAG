<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EU Financial Regulation Assistant (MiFID II, PSD2, GDPR, DORA)">
    <title>FinReg AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header" style="position: relative;">
            <h1 id="app-title">FinReg <span class="accent">AI</span></h1>
            <p class="subtitle">EU Financial Regulation Expert</p>
            <a href="manage.html" class="add-btn" style="text-decoration: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Manage Data
            </a>
        </header>

        <main class="chat-container">
            <div id="chat-history" class="chat-history">
                <div class="message ai">
                    <div class="avatar">AI</div>
                    <div class="message-content">
                        <p>Hello! I am your EU Financial Regulation Assistant. I can help you with queries regarding MiFID II, PSD2, GDPR, and DORA.</p>
                        <p>Ask me a question, like: <em>"Can we execute a payment without explicit consent from the payer?"</em></p>
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <form id="chat-form" class="chat-form">
                    <input type="text" id="user-input" class="user-input" placeholder="Ask about EU Financial Regulations..." autocomplete="off" required>
                    <button type="submit" id="send-button" class="send-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
